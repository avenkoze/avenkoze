<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <defs><style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
    .mono { font-family: 'Share Tech Mono', 'Courier New', monospace; }
    .pulse { animation: pulse 4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.85} }
  </style></defs>
  <rect width="900" height="160" fill="#000000"/>
  <rect x="0" y="0" width="3" height="160" fill="#00ffff" opacity="0.85"/>
  <rect x="3" y="0" width="1" height="160" fill="#00ffff" opacity="0.2"/>
  <rect x="0" y="0"   width="900" height="1" fill="#00ffff" opacity="0.3"/>
  <rect x="0" y="159" width="900" height="1" fill="#00ffff" opacity="0.15"/>
  <text class="mono" x="28" y="22" font-size="8.5" fill="#00ffff" opacity="0.45" letter-spacing="3">&#x25B8; ABOUT</text>
  <rect x="28" y="27" width="60" height="0.5" fill="#00ffff" opacity="0.2"/>
  <text class="mono" x="28" y="58" font-size="14" fill="#ffffff" opacity="0.9" letter-spacing="1.5">i build apps and systems from scratch.</text>
  <text class="mono" x="28" y="80" font-size="14" fill="#ffffff" opacity="0.75" letter-spacing="1.5">product-first, minimal, focused on real use.</text>
  <rect x="28" y="96" width="500" height="0.5" fill="#00ffff" opacity="0.15"/>
  <text class="mono" x="28"  y="118" font-size="9.5" fill="#445566" letter-spacing="1.5">based in</text>
  <text class="mono" x="110" y="118" font-size="9.5" fill="#aaddff" letter-spacing="1.5">turkey</text>
  <text class="mono" x="230" y="118" font-size="9.5" fill="#334455" letter-spacing="1">·</text>
  <text class="mono" x="255" y="118" font-size="9.5" fill="#445566" letter-spacing="1.5">building</text>
  <text class="mono" x="335" y="118" font-size="9.5" fill="#aaddff" letter-spacing="1.5">mobile &amp; web products</text>
  <text class="mono" x="600" y="118" font-size="9.5" fill="#334455" letter-spacing="1">·</text>
  <text class="mono" x="625" y="118" font-size="9.5" fill="#445566" letter-spacing="1.5">contact</text>
  <text class="mono" x="705" y="118" font-size="9.5" fill="#00ccff" opacity="0.8" letter-spacing="1.5">open</text>
  <text class="mono pulse" x="28" y="145" font-size="8.5" fill="#00ffff" opacity="0.35" letter-spacing="2">currently working on something.</text>
</svg>
