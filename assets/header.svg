<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .mono { font-family: 'Share Tech Mono', 'Courier New', monospace; }
      .cursor-blink { animation: blink 1.1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .scan-drift { animation: scan 7s linear infinite; }
      @keyframes scan {
        0%  { transform:translateY(-300px); opacity:0; }
        10% { opacity:0.03; }
        90% { opacity:0.03; }
        100%{ transform:translateY(300px); opacity:0; }
      }
      .glitch-1 { animation: glitch1 9s infinite; }
      @keyframes glitch1 {
        0%,93%,100%{ transform:translate(0,0); opacity:1; }
        95%        { transform:translate(-3px,1px); opacity:0.8; }
        97%        { transform:translate(2px,-1px); opacity:0.9; }
      }
      .t1 { animation: tc1 9s step-end infinite; }
      .t2 { animation: tc2 9s step-end infinite; }
      .t3 { animation: tc3 9s step-end infinite; }
      @keyframes tc1 { 0%,30%{opacity:1} 33%,100%{opacity:0} }
      @keyframes tc2 { 0%,32%{opacity:0} 33%,63%{opacity:1} 64%,100%{opacity:0} }
      @keyframes tc3 { 0%,65%{opacity:0} 66%,96%{opacity:1} 97%,100%{opacity:0} }
    </style>
  </defs>

  <!-- BACKGROUND -->
  <rect width="900" height="300" fill="#000000"/>

  <!-- subtle grid -->
  <g opacity="0.04" stroke="#00ccff" stroke-width="0.5">
    <line x1="75"  y1="0" x2="75"  y2="300"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="225" y1="0" x2="225" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="375" y1="0" x2="375" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="525" y1="0" x2="525" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="675" y1="0" x2="675" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
    <line x1="825" y1="0" x2="825" y2="300"/>
    <line x1="0" y1="75"  x2="900" y2="75"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="225" x2="900" y2="225"/>
  </g>

  <!-- scanline sweep -->
  <rect class="scan-drift" x="0" y="0" width="900" height="40" fill="#00ffff" opacity="0"/>

  <!-- CORNER BRACKETS -->
  <rect x="20" y="16" width="24" height="2" fill="#00ffff" opacity="0.85"/>
  <rect x="20" y="16" width="2" height="18" fill="#00ffff" opacity="0.85"/>
  <rect x="856" y="16" width="24" height="2" fill="#00ffff" opacity="0.85"/>
  <rect x="878" y="16" width="2" height="18" fill="#00ffff" opacity="0.85"/>
  <rect x="20" y="276" width="24" height="2" fill="#00ffff" opacity="0.85"/>
  <rect x="20" y="260" width="2" height="18" fill="#00ffff" opacity="0.85"/>
  <rect x="856" y="276" width="24" height="2" fill="#00ffff" opacity="0.85"/>
  <rect x="878" y="260" width="2" height="18" fill="#00ffff" opacity="0.85"/>

  <!-- github bottom left — no bar, just text -->
  <text class="mono" x="40" y="293" font-size="9" fill="#00ffff" opacity="0.35" letter-spacing="2">github.com/avenkoze</text>

  <!-- MAIN NAME — moved up -->
  <text class="mono glitch-1" x="40" y="118" font-size="72" font-weight="700"
        fill="#00ffff" opacity="0.12" letter-spacing="4">AVENKOZE</text>
  <text class="mono" x="40" y="118" font-size="72" font-weight="700"
        fill="#ffffff" letter-spacing="4">AVENKOZE</text>

  <!-- underline -->
  <rect x="40" y="126" width="432" height="2" fill="#00ffff" opacity="0.85"/>
  <rect x="40" y="129" width="210" height="0.5" fill="#00ffff" opacity="0.35"/>

  <!-- typing cycle + cursor -->
  <text class="mono t1" x="42" y="155" font-size="12" fill="#00ccff" opacity="0" letter-spacing="3">making things that work</text>
  <text class="mono t2" x="42" y="155" font-size="12" fill="#00ccff" opacity="0" letter-spacing="3">apps &amp; systems from scratch.</text>
  <text class="mono t3" x="42" y="155" font-size="12" fill="#00ccff" opacity="0" letter-spacing="3">product-first, minimal, focused.</text>
  <text class="mono cursor-blink" x="42" y="175" font-size="12" fill="#00ffff" letter-spacing="3">▮</text>

  <!-- RIGHT PANEL -->
  <rect x="596" y="20" width="268" height="250" fill="#00ffff" opacity="0.025"/>
  <rect x="596" y="20"  width="268" height="1"   fill="#00ffff" opacity="0.3"/>
  <rect x="596" y="20"  width="1"   height="250" fill="#00ffff" opacity="0.3"/>
  <rect x="864" y="20"  width="1"   height="250" fill="#00ffff" opacity="0.18"/>
  <rect x="596" y="270" width="268" height="1"   fill="#00ffff" opacity="0.18"/>
  <rect x="716" y="32"  width="0.5" height="228" fill="#00ffff" opacity="0.14"/>

  <text class="mono" x="606" y="38" font-size="8" fill="#00ffff" opacity="0.4" letter-spacing="2">▸ PROFILE</text>

  <text class="mono" x="606" y="60"  font-size="9" fill="#445566" letter-spacing="1">HANDLE</text>
  <text class="mono" x="726" y="60"  font-size="9" fill="#aaddff" letter-spacing="1">avenkoze</text>

  <text class="mono" x="606" y="82" font-size="9" fill="#445566" letter-spacing="1">STACK</text>
  <text class="mono" x="726" y="82" font-size="9" fill="#aaddff" letter-spacing="1">RN · Node · PG</text>

  <text class="mono" x="606" y="104" font-size="9" fill="#445566" letter-spacing="1">FOCUS</text>
  <text class="mono" x="726" y="104" font-size="9" fill="#aaddff" letter-spacing="1">apps · systems</text>

  <text class="mono" x="606" y="126" font-size="9" fill="#445566" letter-spacing="1">LANG</text>
  <text class="mono" x="726" y="126" font-size="9" fill="#aaddff" letter-spacing="1">TR · EN · KR</text>

  <text class="mono" x="606" y="148" font-size="9" fill="#445566" letter-spacing="1">STATUS</text>
  <text class="mono" x="726" y="148" font-size="9" fill="#00ff88" letter-spacing="1">● active</text>

  <text class="mono" x="606" y="170" font-size="9" fill="#445566" letter-spacing="1">OPEN TO</text>
  <text class="mono" x="726" y="170" font-size="9" fill="#aaddff" letter-spacing="1">collab · build</text>

</svg>