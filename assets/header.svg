<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      .mono { font-family: 'Share Tech Mono', 'Courier New', monospace; }
      .cursor-blink { animation: blink 1.1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .scan-drift { animation: scan 7s linear infinite; }
      @keyframes scan {
        0%  { transform:translateY(-300px); opacity:0; }
        10% { opacity:0.03; }
        90% { opacity:0.03; }
        100%{ transform:translateY(300px); opacity:0; }
      }
      .glitch-1 { animation: glitch1 9s infinite; }
      @keyframes glitch1 {
        0%,93%,100%{ transform:translate(0,0); opacity:1; }
        95%        { transform:translate(-3px,1px); opacity:0.8; }
        97%        { transform:translate(2px,-1px); opacity:0.9; }
      }
      .pulse-line { animation: pulse 3s ease-in-out infinite; }
      @keyframes pulse { 0%,100%{opacity:0.45} 50%{opacity:0.9} }
    </style>
  </defs>

  <!-- BACKGROUND -->
  <rect width="900" height="300" fill="#000000"/>

  <!-- subtle grid -->
  <g opacity="0.04" stroke="#00ccff" stroke-width="0.5">
    <line x1="75"  y1="0" x2="75"  y2="300"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="225" y1="0" x2="225" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="375" y1="0" x2="375" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="525" y1="0" x2="525" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="675" y1="0" x2="675" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
    <line x1="825" y1="0" x2="825" y2="300"/>
    <line x1="0" y1="75"  x2="900" y2="75"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="225" x2="900" y2="225"/>
  </g>

  <!-- scanline sweep -->
  <rect class="scan-drift" x="0" y="0" width="900" height="40" fill="#00ffff" opacity="0"/>

  <!-- TOP BAR -->
  <rect x="0" y="0" width="900" height="28" fill="#00ffff" opacity="0.055"/>
  <rect x="0" y="0" width="900" height="1.5" fill="#00ffff" opacity="0.9"/>
  <rect class="pulse-line" x="0" y="1.5" width="900" height="0.5" fill="#00ffff"/>
  <rect x="0" y="28" width="900" height="0.75" fill="#00ffff" opacity="0.3"/>
  <text class="mono" x="40" y="19" font-size="10" fill="#00ffff" opacity="0.7" letter-spacing="2">a.k.a m. umut aydin</text>
  <text class="mono" x="660" y="19" font-size="10" fill="#00ffff" opacity="0.3" letter-spacing="2">github.com/avenkoze</text>

  <!-- CORNER BRACKETS -->
  <rect x="20" y="36" width="24" height="2" fill="#00ffff" opacity="0.85"/>
  <rect x="20" y="36" width="2" height="18" fill="#00ffff" opacity="0.85"/>
  <rect x="856" y="36" width="24" height="2" fill="#00ffff" opacity="0.85"/>
  <rect x="878" y="36" width="2" height="18" fill="#00ffff" opacity="0.85"/>
  <rect x="20" y="260" width="24" height="2" fill="#00ffff" opacity="0.85"/>
  <rect x="20" y="244" width="2" height="18" fill="#00ffff" opacity="0.85"/>
  <rect x="856" y="260" width="24" height="2" fill="#00ffff" opacity="0.85"/>
  <rect x="878" y="244" width="2" height="18" fill="#00ffff" opacity="0.85"/>

  <!-- BOTTOM BAR -->
  <rect x="0" y="270" width="900" height="30" fill="#00ffff" opacity="0.04"/>
  <rect x="0" y="270" width="900" height="0.75" fill="#00ffff" opacity="0.3"/>
  <rect x="0" y="298" width="900" height="1.5" fill="#00ffff" opacity="0.9"/>
  <text class="mono" x="40" y="289" font-size="9" fill="#00ffff" opacity="0.45" letter-spacing="2">github.com/avenkoze</text>
  <text class="mono" x="660" y="289" font-size="9" fill="#00ffff" opacity="0.22" letter-spacing="2">메이커 · 빌더 · 개발자</text>

  <!-- MAIN NAME -->
  <text class="mono glitch-1" x="40" y="155" font-size="72" font-weight="700"
        fill="#00ffff" opacity="0.12" letter-spacing="4">AVENKOZE</text>
  <text class="mono" x="40" y="155" font-size="72" font-weight="700"
        fill="#ffffff" letter-spacing="4">AVENKOZE</text>

  <!-- underline -->
  <rect x="40" y="163" width="432" height="2" fill="#00ffff" opacity="0.85"/>
  <rect x="40" y="166" width="210" height="0.5" fill="#00ffff" opacity="0.35"/>

  <!-- tagline with cursor -->
  <text class="mono" x="42" y="192" font-size="12" fill="#00ccff" opacity="0.85" letter-spacing="3">making things that work</text>
  <text class="mono cursor-blink" x="282" y="192" font-size="12" fill="#00ffff" letter-spacing="3">▮</text>

  <!-- about -->
  <text class="mono" x="42" y="216" font-size="10" fill="#00ffff" opacity="0.55" letter-spacing="2">i build apps and systems from scratch. product-first, minimal.</text>

  <!-- links -->
  <text class="mono" x="42" y="238" font-size="9" fill="#00ffff" opacity="0.35" letter-spacing="2">linkedin.com/in/avenkoze  ·  github.com/avenkoze</text>

  <!-- Korean sub -->
  <text class="mono" x="42" y="256" font-size="11" fill="#00ffff" opacity="0.22" letter-spacing="2">메이커 · 빌더 · 개발자</text>

</svg>